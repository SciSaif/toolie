name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: FormCraft v__VERSION__
          releaseBody: |
            ## Windows
            Download **FormCraft_*_x64-setup.exe** (or the `.msi` installer), run it, and follow the prompts.

            If Windows SmartScreen warns about an unknown publisher, click **More info** → **Run anyway**.

            ## macOS
            Download the `.dmg` for your Mac (Apple Silicon or Intel), open it, and drag FormCraft to Applications.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
